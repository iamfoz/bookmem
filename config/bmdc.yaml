classification_scheme: bmdc
scheme_name: BookMem Decimal Classification
short_name: BMDC
version: 1
numbering_policy: interoperable_decimal_numbers_original_wording
external_text_policy: do_not_copy_proprietary_editorial_text
notes: >
  BookMem Decimal Classification (BMDC) is a pragmatic decimal subject map for
  routing a personal Markdown book corpus. Its class numbers are intended to be
  interoperable with established decimal library classification numbering habits
  where useful, but the labels, aliases and notes in this file are BookMem's own
  working descriptions. Do not copy proprietary editorial descriptions, captions,
  schedules, hierarchy text or manual notes from external classification products
  into this file. BMDC is not named as, affiliated with, endorsed by, or a
  substitute for any third-party classification product.

