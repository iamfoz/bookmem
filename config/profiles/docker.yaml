schema_version: 1
profile:
  name: docker
  label: Docker/container
  description: Container-friendly profile for API/MCP services.
  environment: docker

paths:
  data_dir: /app/data
  config_dir: /app/config
  exports_dir: /app/exports
  backups_dir: /app/backups
  lancedb_dir: /app/data/lancedb

services:
  api:
    host: 0.0.0.0
    port: 8765
    require_api_key: true
  mcp:
    enabled: true

retrieval:
  default_workspace:
  default_limit: 10

agent:
  permissions_profile: assistant_agent
  require_confirmation_for_writes: true

features:
  auto_restore_points: true
  audit_log: true
  plugins_enabled: false
